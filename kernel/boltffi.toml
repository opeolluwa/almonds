experimental = []

[cargo]
global_args = []

[cargo.command_args]

[package]
name = "almond_kernel_ffi"

[targets.apple]
enabled = true
output = "boltffi/apple"
deployment_target = "16.0"
include_macos = false

[targets.apple.swift]
module_name = "AlmondKernelFfi"
tools_version = "5.9"
error_style = "throwing"

[targets.apple.swift.type_mappings]

[targets.apple.header]

[targets.apple.xcframework]

[targets.apple.spm]
distribution = "local"
layout = "ffi-only"
skip_package_swift = false

[targets.apple.debug_symbols]
enabled = false
format = "zip"
bundle = "unstripped"

[targets.android]
enabled = true
output = "boltffi/android"
min_sdk = 24

[targets.android.kotlin]
package = "com.example.almond_kernel_ffi"
api_style = "top_level"
error_style = "throwing"
factory_style = "constructors"

[targets.android.kotlin.type_mappings]

[targets.android.header]

[targets.android.pack]

[targets.android.debug_symbols]
enabled = false
format = "zip"
bundle = "unstripped"

[targets.wasm]
enabled = true
triple = "wasm32-unknown-unknown"
profile = "release"
output = "boltffi/wasm"

[targets.wasm.optimize]

[targets.wasm.typescript.type_mappings]

[targets.wasm.npm]

[targets.java.jvm]
enabled = false
output = "boltffi/java"
strip_symbols = false

[targets.java.jvm.debug_symbols]
enabled = false
format = "zip"
bundle = "unstripped"

[targets.java.android]
enabled = false
output = "boltffi/java/android"
min_sdk = 24

[targets.dart]
output = "boltffi/dart"
enabled = false

[targets.python]
output = "boltffi/python"
enabled = false

[targets.python.wheel]

[targets.csharp]
output = "boltffi/csharp"
enabled = false
